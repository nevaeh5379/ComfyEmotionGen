services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        CEG_BUNDLE_VERSION: ${CEG_BUNDLE_VERSION:-dev}
        CEG_COMMIT: ${CEG_COMMIT:-}
    environment:
      COMFYUI_WORKERS: ${COMFYUI_WORKERS:-http://host.docker.internal:8188}
      BACKEND_PORT: ${BACKEND_PORT:-5882}
      BACKEND_HOST: 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-5882}:${BACKEND_PORT:-5882}"
    volumes:
      - ./data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        CEG_BUNDLE_VERSION: ${CEG_BUNDLE_VERSION:-dev}
        CEG_COMMIT: ${CEG_COMMIT:-}
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-5882}
      # Override BACKEND_URL if the backend is not on localhost (e.g. remote server).
      BACKEND_URL: ${BACKEND_URL:-}
    ports:
      - "${FRONTEND_PORT:-6974}:80"
    depends_on:
      - backend
    restart: unless-stopped