services:
  # Unified container deployment. Run with:
  #   docker compose up
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CEG_BUNDLE_VERSION: ${CEG_BUNDLE_VERSION:-dev}
        CEG_COMMIT: ${CEG_COMMIT:-}
    environment:
      # Comma-separated list of ComfyUI server URLs (one per GPU).
      # On Docker Desktop (Win/Mac) use host.docker.internal to reach the host.
      # On Linux either add extra_hosts below or use the host's LAN IP.
      COMFYUI_WORKERS: ${COMFYUI_WORKERS:-http://host.docker.internal:8188}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-${FRONTEND_PORT:-6974}}:8000"
    volumes:
      - ./data:/app/backend/data
    restart: unless-stopped