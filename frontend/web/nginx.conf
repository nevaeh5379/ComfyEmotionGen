server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /config.js is rewritten at container start by docker-entrypoint.sh
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }
}
