server {
    listen 8000 default_server;
    listen [::]:8000 default_server;

    root /app/static;
    index index.html;

    server_name _;

    # Dynamic backend config injection
    location = /config.js {
        add_header Content-Type application/javascript;
        return 200 "window.COMFY_EMOTION_GEN_BACKEND_URL = window.location.origin;";
    }

    # Proxy websockets to backend
    location /ws {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy API and specific backend routes
    location ~ ^/(templates|object_info|version|health|workers|render|workflow|jobs|logs|images|saved-images|tags|trash|asset-groups|export|db|app-settings|webhooks|uploaded_images|docs|openapi.json|redoc)(/|$) {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files with SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
