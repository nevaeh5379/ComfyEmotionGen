name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for creating releases
  packages: write   # for pushing to ghcr.io

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      bundle: ${{ steps.v.outputs.bundle }}
      docker_tag: ${{ steps.v.outputs.docker_tag }}
      commit: ${{ steps.v.outputs.commit }}
      is_release: ${{ steps.v.outputs.is_release }}
      image_backend: ${{ steps.v.outputs.image_backend }}
      image_frontend: ${{ steps.v.outputs.image_frontend }}
      image_aio: ${{ steps.v.outputs.image_aio }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          SHORT=$(git rev-parse --short HEAD)
          REPO_LC="${GITHUB_REPOSITORY,,}"   # ghcr requires lowercase
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUNDLE="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          else
            # KST timestamp so the tag is self-describing in local time and
            # lexicographic sort = chronological sort (same-day builds no longer
            # collapse to one date label ordered by SHA).
            STAMP=$(TZ=Asia/Seoul date +%Y.%m.%d.%H%M%S)
            BUNDLE="v${STAMP}-dev+${SHORT}"
            IS_RELEASE=false
          fi
          # Docker tags cannot contain '+'
          DOCKER_TAG="${BUNDLE//+/.}"
          echo "bundle=$BUNDLE"               >> $GITHUB_OUTPUT
          echo "docker_tag=$DOCKER_TAG"       >> $GITHUB_OUTPUT
          echo "commit=$SHORT"                >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE"       >> $GITHUB_OUTPUT
          echo "image_backend=$REPO_LC/ceg-backend"   >> $GITHUB_OUTPUT
          echo "image_frontend=$REPO_LC/ceg-frontend" >> $GITHUB_OUTPUT
          echo "image_aio=$REPO_LC/ceg-all-in-one"    >> $GITHUB_OUTPUT
          echo "Resolved bundle=$BUNDLE  docker_tag=$DOCKER_TAG  release=$IS_RELEASE  repo=$REPO_LC"

  portable:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            variant: full
            artifact: ComfyEmotionGen-windows-amd64
            build: pwsh portable/build.ps1
            binary: portable/dist/ComfyEmotionGen.exe
            release_name: ComfyEmotionGen-windows-amd64.exe
          - os: windows-11-arm
            variant: full
            artifact: ComfyEmotionGen-windows-arm64
            build: pwsh portable/build.ps1
            binary: portable/dist/ComfyEmotionGen.exe
            release_name: ComfyEmotionGen-windows-arm64.exe
          - os: ubuntu-latest
            variant: full
            artifact: ComfyEmotionGen-linux-amd64
            build: bash portable/build.sh
            binary: portable/dist/ComfyEmotionGen
            release_name: ComfyEmotionGen-linux-amd64
          - os: ubuntu-24.04-arm
            variant: full
            artifact: ComfyEmotionGen-linux-arm64
            build: bash portable/build.sh
            binary: portable/dist/ComfyEmotionGen
            release_name: ComfyEmotionGen-linux-arm64
          - os: macos-26
            variant: full
            artifact: ComfyEmotionGen-macos-arm64
            build: bash portable/build.sh
            binary: portable/dist/ComfyEmotionGen
            release_name: ComfyEmotionGen-macos-arm64
          - os: macos-26-intel
            variant: full
            artifact: ComfyEmotionGen-macos-amd64
            build: bash portable/build.sh
            binary: portable/dist/ComfyEmotionGen
            release_name: ComfyEmotionGen-macos-amd64

          # --- backend-only ---
          - os: windows-latest
            variant: backend
            artifact: ComfyEmotionGen-backend-windows-amd64
            build: pwsh portable/build_backend.ps1
            binary: portable/dist/ComfyEmotionGen-backend.exe
            release_name: ComfyEmotionGen-backend-windows-amd64.exe
          - os: windows-11-arm
            variant: backend
            artifact: ComfyEmotionGen-backend-windows-arm64
            build: pwsh portable/build_backend.ps1
            binary: portable/dist/ComfyEmotionGen-backend.exe
            release_name: ComfyEmotionGen-backend-windows-arm64.exe
          - os: ubuntu-latest
            variant: backend
            artifact: ComfyEmotionGen-backend-linux-amd64
            build: bash portable/build_backend.sh
            binary: portable/dist/ComfyEmotionGen-backend
            release_name: ComfyEmotionGen-backend-linux-amd64
          - os: ubuntu-24.04-arm
            variant: backend
            artifact: ComfyEmotionGen-backend-linux-arm64
            build: bash portable/build_backend.sh
            binary: portable/dist/ComfyEmotionGen-backend
            release_name: ComfyEmotionGen-backend-linux-arm64
          - os: macos-26
            variant: backend
            artifact: ComfyEmotionGen-backend-macos-arm64
            build: bash portable/build_backend.sh
            binary: portable/dist/ComfyEmotionGen-backend
            release_name: ComfyEmotionGen-backend-macos-arm64
          - os: macos-26-intel
            variant: backend
            artifact: ComfyEmotionGen-backend-macos-amd64
            build: bash portable/build_backend.sh
            binary: portable/dist/ComfyEmotionGen-backend
            release_name: ComfyEmotionGen-backend-macos-amd64

          # --- frontend ---
          - os: windows-latest
            variant: frontend
            artifact: ComfyEmotionGen-frontend-windows-amd64
            build: pwsh portable/build_frontend.ps1
            binary: portable/dist/ComfyEmotionGen-frontend.exe
            release_name: ComfyEmotionGen-frontend-windows-amd64.exe
          - os: windows-11-arm
            variant: frontend
            artifact: ComfyEmotionGen-frontend-windows-arm64
            build: pwsh portable/build_frontend.ps1
            binary: portable/dist/ComfyEmotionGen-frontend.exe
            release_name: ComfyEmotionGen-frontend-windows-arm64.exe
          - os: ubuntu-latest
            variant: frontend
            artifact: ComfyEmotionGen-frontend-linux-amd64
            build: bash portable/build_frontend.sh
            binary: portable/dist/ComfyEmotionGen-frontend
            release_name: ComfyEmotionGen-frontend-linux-amd64
          - os: ubuntu-24.04-arm
            variant: frontend
            artifact: ComfyEmotionGen-frontend-linux-arm64
            build: bash portable/build_frontend.sh
            binary: portable/dist/ComfyEmotionGen-frontend
            release_name: ComfyEmotionGen-frontend-linux-arm64
          - os: macos-26
            variant: frontend
            artifact: ComfyEmotionGen-frontend-macos-arm64
            build: bash portable/build_frontend.sh
            binary: portable/dist/ComfyEmotionGen-frontend
            release_name: ComfyEmotionGen-frontend-macos-arm64
          - os: macos-26-intel
            variant: frontend
            artifact: ComfyEmotionGen-frontend-macos-amd64
            build: bash portable/build_frontend.sh
            binary: portable/dist/ComfyEmotionGen-frontend
            release_name: ComfyEmotionGen-frontend-macos-amd64
    runs-on: ${{ matrix.os }}
    env:
      CEG_BUNDLE_VERSION: ${{ needs.version.outputs.bundle }}
      CEG_COMMIT: ${{ needs.version.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: matrix.variant == 'full' || matrix.variant == 'backend' || matrix.variant == 'frontend-exe'
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        if: matrix.variant == 'full' || matrix.variant == 'frontend-exe'
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install backend deps + PyInstaller
        if: matrix.variant == 'full' || matrix.variant == 'backend'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller
      - name: Install PyInstaller (frontend only)
        if: matrix.variant == 'frontend-exe'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build portable
        run: ${{ matrix.build }}
      - name: Stage release binary
        shell: bash
        run: |
          if [[ ! -f "${{ matrix.binary }}" ]]; then
            echo "::error::Build produced no binary at ${{ matrix.binary }}"
            ls -la portable/dist/ || true
            exit 1
          fi
          mkdir -p release
          # Rename so the release asset is self-describing (Linux/macOS would
          # otherwise collide on the basename 'ComfyEmotionGen').
          cp "${{ matrix.binary }}" "release/${{ matrix.release_name }}"
          ls -la release/
      - uses: actions/upload-artifact@v4
        with:
          # Artifact names disallow '+', so use the sanitized docker_tag form.
          name: ${{ matrix.artifact }}-${{ needs.version.outputs.docker_tag }}
          path: release/${{ matrix.release_name }}
          if-no-files-found: error

  frontend-zip:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Build frontend
        run: |
          cd frontend/web
          npm ci
          npm run build
      - name: Create ZIP
        run: |
          cd frontend/web/dist
          zip -r ../../../frontend-dist.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: ComfyEmotionGen-frontend-dist-${{ needs.version.outputs.docker_tag }}
          path: frontend-dist.zip
          if-no-files-found: error

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          build-args: |
            CEG_BUNDLE_VERSION=${{ needs.version.outputs.bundle }}
            CEG_COMMIT=${{ needs.version.outputs.commit }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_backend }}:${{ needs.version.outputs.docker_tag }}
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_backend }}:${{ needs.version.outputs.is_release == 'true' && 'latest' || 'dev' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          push: true
          build-args: |
            CEG_BUNDLE_VERSION=${{ needs.version.outputs.bundle }}
            CEG_COMMIT=${{ needs.version.outputs.commit }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_frontend }}:${{ needs.version.outputs.docker_tag }}
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_frontend }}:${{ needs.version.outputs.is_release == 'true' && 'latest' || 'dev' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
      - name: Build & push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          push: true
          build-args: |
            CEG_BUNDLE_VERSION=${{ needs.version.outputs.bundle }}
            CEG_COMMIT=${{ needs.version.outputs.commit }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_aio }}:${{ needs.version.outputs.docker_tag }}
            ${{ env.REGISTRY }}/${{ needs.version.outputs.image_aio }}:${{ needs.version.outputs.is_release == 'true' && 'latest' || 'dev' }}
          cache-from: type=gha,scope=aio
          cache-to: type=gha,scope=aio,mode=max

  release:
    needs: [version, portable, frontend-zip, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ComfyEmotionGen-*
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Git tags reject '+', so use the sanitized form for the tag itself.
          # The canonical bundle version (with '+') is still embedded in binaries.
          tag_name: ${{ needs.version.outputs.docker_tag }}
          name: ${{ needs.version.outputs.bundle }}
          prerelease: ${{ needs.version.outputs.is_release != 'true' }}
          files: artifacts/**/*
          body: |
            Bundle: `${{ needs.version.outputs.bundle }}`
            Commit: `${{ needs.version.outputs.commit }}`

            Portable executables:
            - `ComfyEmotionGen-{platform}` — full stack (API + UI)
            - `ComfyEmotionGen-backend-{platform}` — API server only (`--port`, `--host`)
            - `ComfyEmotionGen-frontend-{platform}` — UI server only (`--port`, `--backend-url`, `--no-browser`)
            - `ComfyEmotionGen-frontend-dist-${{ needs.version.outputs.docker_tag }}.zip` — static web assets

            Docker:
            - `${{ env.REGISTRY }}/${{ needs.version.outputs.image_backend }}:${{ needs.version.outputs.docker_tag }}`
            - `${{ env.REGISTRY }}/${{ needs.version.outputs.image_frontend }}:${{ needs.version.outputs.docker_tag }}`
            - `${{ env.REGISTRY }}/${{ needs.version.outputs.image_aio }}:${{ needs.version.outputs.docker_tag }}` (single-container)
